<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magazine Skin Write Prototype</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-bg: #0a192f;
            --secondary-bg: #112240;
            --text-main: #e6f1ff;
            --text-muted: #8892b0;
            --accent: #d4af37;
            --font-serif: 'Playfair Display', serif;
            --font-sans: 'Inter', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-sans);
            background-color: var(--primary-bg);
            color: var(--text-main);
            line-height: 1.7;
        }

        .content-wrapper {
            max-width: 800px;
            margin: 80px auto;
            padding: 0 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .page-title {
            font-family: var(--font-serif);
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .page-desc {
            color: var(--text-muted);
        }

        /* FORM STYLES */
        .write-form {
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .form-label {
            font-weight: 500;
            color: var(--accent);
            font-size: 0.9rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-input,
        .form-select,
        .form-textarea {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            color: #fff;
            font-family: var(--font-sans);
            font-size: 1rem;
            border-radius: 4px;
            transition: 0.3s;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            outline: none;
        }

        .form-textarea {
            min-height: 400px;
            line-height: 1.8;
            resize: vertical;
        }

        .file-drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.2);
            padding: 40px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .file-drop-zone:hover {
            border-color: var(--accent);
            background: rgba(255, 255, 255, 0.02);
        }

        .drop-txt {
            color: var(--text-muted);
            margin-top: 10px;
        }

        .drop-icon {
            font-size: 40px;
            color: var(--accent);
        }

        .btn-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }

        .btn {
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            font-size: 1rem;
        }

        .btn-submit {
            background: var(--accent);
            color: #000;
        }

        .btn-submit:hover {
            background: #fff;
        }

        .btn-cancel {
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
        }

        .btn-cancel:hover {
            border-color: #fff;
            color: #fff;
        }

        /* SUB LAYOUT (HERO & BREADCRUMB) */
        .sub-hero {
            position: relative;
            height: 40vh;
            min-height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000;
        }

        .sub-hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1558655146-d09347e92766?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            opacity: 0.4;
        }

        .sub-hero-content {
            position: relative;
            z-index: 2;
            text-align: center;
        }

        .sub-hero-title {
            font-family: var(--font-serif);
            font-size: 3rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: 0.5rem;
        }

        .sub-hero-subtitle {
            font-size: 1rem;
            color: rgba(255, 255, 255, 0.8);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .breadcrumb {
            background-color: var(--secondary-bg);
            padding: 15px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .breadcrumb-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: flex-end;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .breadcrumb span {
            margin: 0 5px;
        }
    </style>
</head>

<body>

    <!-- SUB HERO -->
    <div class="sub-hero">
        <div class="sub-hero-bg"></div>
        <div class="sub-hero-content">
            <h2 class="sub-hero-title">MAGAZINE</h2>
            <p class="sub-hero-subtitle">WRITE ENTRY</p>
        </div>
    </div>
    <!-- BREADCRUMB -->
    <div class="breadcrumb">
        <div class="breadcrumb-inner">
            <span>Home</span> &gt; <span>Magazine</span> &gt; <span>Write</span>
        </div>
    </div>

    <div class="content-wrapper">
        <div class="page-header">
            <h1 class="page-title">New Entry</h1>
            <p class="page-desc">Share your visual story with the world.</p>
        </div>

        <form class="write-form">
            <div class="form-group">
                <label class="form-label">Category</label>
                <select class="form-select">
                    <option>Select Category</option>
                    <option>Architecture</option>
                    <option>Interior</option>
                    <option>Concept</option>
                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Title</label>
                <input type="text" class="form-input" placeholder="Enter a captivating title">
            </div>

            <div class="form-group">
                <label class="form-label">Cover Image</label>
                <div class="file-drop-zone">
                    <div class="drop-icon">📷</div>
                    <div class="drop-txt">Drag & Drop your main image here<br>or click to browse</div>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Story</label>
                <textarea class="form-textarea" placeholder="Start writing your story..."></textarea>
            </div>

            <div class="btn-group">
                <button type="button" class="btn btn-cancel" onclick="location.href='list.html'">Cancel</button>
                <button type="submit" class="btn btn-submit">Publish</button>
            </div>
        </form>
    </div>

</body>

</html>
