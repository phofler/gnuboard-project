<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>견적문의 | 성우첨단패널</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>

<body>

    <header>
        <div class="container header-main">
            <a href="index.html" class="logo"><img src="m_logo.png" alt="성우첨단패널 로고" style="height: 50px;"></a>
            <nav>
                <ul class="gnb">
                    <li><a href="index.html">HOME</a></li>
                    <li><a href="about.html">회사소개</a></li>
                    <li><a href="products.html">제품소개</a></li>
                    <li><a href="projects.html">시공사례</a></li>
                    <li><a href="technical.html">기술자료</a></li>
                    <li><a href="inquiry.html" style="color: var(--accent-color);">견적문의</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section style="background: var(--bg-light); padding: 80px 0;">
        <div class="container">
            <div class="section-header">
                <h2>ONLINE INQUIRY</h2>
                <p>제품 상담 및 견적 요청을 남겨주시면 담당자가 신속히 연락드리겠습니다.</p>
            </div>

            <div class="inquiry-form">
                <form action="#" method="post">
                    <div class="form-row">
                        <div class="form-group">
                            <label>성함/담당자명 *</label>
                            <input type="text" placeholder="이름을 입력해 주세요" required>
                        </div>
                        <div class="form-group">
                            <label>업체명 / 상호</label>
                            <input type="text" placeholder="소속을 입력해 주세요">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>연락처 *</label>
                            <input type="tel" placeholder="010-0000-0000" required>
                        </div>
                        <div class="form-group">
                            <label>이메일 *</label>
                            <input type="email" placeholder="example@domain.com" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>문의 제품 선택</label>
                        <div style="display: flex; gap: 20px; margin-top: 10px;">
                            <label style="font-weight: normal;"><input type="checkbox"> 메탈판넬</label>
                            <label style="font-weight: normal;"><input type="checkbox"> 그라스울</label>
                            <label style="font-weight: normal;"><input type="checkbox"> 지붕재</label>
                            <label style="font-weight: normal;"><input type="checkbox"> 기타</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label>문의 내용 *</label>
                        <textarea placeholder="프로젝트 규모, 예상 시공일정, 필요한 제품 규격 등 상세 내용을 적어주세요." required></textarea>
                    </div>

                    <div class="form-group"
                        style="background: #fdfdfd; padding: 20px; border: 1px solid #eee; margin-top: 30px; font-size: 0.9rem;">
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                            <input type="checkbox" required>
                            <span>개인정보 수집 및 이용 안내에 동의합니다. (필수)</span>
                        </label>
                        <a href="#" style="color: blue; text-decoration: underline; margin-left: 25px;">약관보기</a>
                    </div>

                    <div style="text-align: center; margin-top: 50px;">
                        <button type="submit" class="btn btn-primary" style="width: 300px;">상담 신청하기</button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-grid">
                <div class="footer-brand">
                    <div class="footer-logo">SUNGWOO</div>
                    <p>성우첨단패널은 신뢰와 기술력을 바탕으로 고객의 꿈을 실현하는 파트너가 되겠습니다.</p>
                </div>
                <div class="footer-info" style="grid-column: span 2;">
                    <h4>HEAD OFFICE & FACTORY</h4>
                    <p><i class="fas fa-map-marker-alt"></i> <strong>본사:</strong> 경기도 안산시 단원구 산단로 123 (성우빌딩)</p>
                    <p><i class="fas fa-industry"></i> <strong>제1공장:</strong> 경기도 화성시 마도면 마도공단로 456</p>
                    <div style="display: flex; gap: 30px; margin-top: 15px;">
                        <p><i class="fas fa-phone-alt"></i> 031-123-4567</p>
                        <p><i class="fas fa-fax"></i> 031-123-4568</p>
                        <p><i class="fas fa-id-card"></i> 123-45-67890</p>
                    </div>
                </div>
            </div>
        </div>
    </footer>

</body>

</html>
