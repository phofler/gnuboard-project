<style>
    /* Style B: Modern Split Premium */
    .footer-skin-b {
        padding: 80px 0;
        background-color: var(--cp-bg, #ffffff);
        color: #333;
        margin: 20px 0;
    }

    .footer-skin-b .footer-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 60px;
    }

    .footer-skin-b .footer-left {
        flex: 1;
    }

    .footer-skin-b .footer-right {
        flex: 1.5;
    }

    .footer-skin-b .footer-logo {
        margin-bottom: 30px;
    }

    .footer-skin-b .footer-logo img {
        height: 45px;
        object-fit: contain;
    }

    .footer-skin-b .footer-links {
        display: flex;
        gap: 20px;
        margin-bottom: 30px;
    }

    .footer-skin-b .footer-links a {
        font-size: 0.95rem;
        color: #333;
        font-weight: 500;
        text-decoration: none;
    }

    .footer-skin-b .footer-copyright {
        font-size: 0.85rem;
        color: #999;
    }

    .footer-skin-b .footer-contact-grid {
        display: grid;
        gap: 20px;
    }

    .footer-skin-b .info-item {
        font-size: 0.9rem;
    }

    .footer-skin-b .label {
        display: block;
        font-size: 0.75rem;
        text-transform: uppercase;
        color: #999;
        margin-bottom: 5px;
    }

    .footer-skin-b .value {
        font-weight: 500;
    }

    .footer-skin-b .contact-flex {
        display: flex;
        gap: 40px;
        flex-wrap: wrap;
    }
</style>

<div class="footer-skin-b">
    <div class="footer-container">
        <div class="footer-left">
            <div class="footer-logo">
                {logo}
            </div>
            <div class="footer-links">
                {link1}
                {link2}
            </div>
            <div class="footer-copyright">
                {copyright}
            </div>
        </div>

        <div class="footer-right">
            <div class="footer-contact-grid">
                <div class="info-item label-top" style="margin-bottom:10px; border-bottom:1px solid rgba(0,0,0,0.05); padding-bottom:15px;">
                    <span class="value" style="font-weight:700; font-size:1.1rem;">{company}</span>
                    <span class="value" style="margin-left:20px;"><span class="label" style="display:inline; margin-right:5px;">{ceo_name}</span> {ceo}</span>
                    <span class="value" style="margin-left:20px;"><span class="label" style="display:inline; margin-right:5px;">{bizno_name}</span> {bizno}</span>
                </div>
                <div class="info-item label-top">
                    <span class="label">{addr_name}</span>
                    <span class="value">{addr}</span>
                </div>
                <div class="contact-flex">
                    <div class="info-item">
                        <span class="label">{tel_name}</span>
                        <span class="value"><a href="tel:{tel}">{tel}</a></span>
                    </div>
                    <div class="info-item">
                        <span class="label">{fax_name}</span>
                        <span class="value">{fax}</span>
                    </div>
                    <div class="info-item">
                        <span class="label">{email_name}</span>
                        <span class="value"><a href="mailto:{email}">{email}</a></span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
