<style>
    /* Style D: Editorial Bold Premium */
    .footer-skin-d {
        padding: 120px 0;
        background-color: var(--cp-bg, #ffffff);
        color: #333;
        margin: 20px 0;
    }

    .footer-skin-d .footer-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
    }

    .footer-skin-d .footer-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-end;
        margin-bottom: 80px;
    }

    .footer-skin-d .footer-logo img {
        height: 40px;
        margin-bottom: 20px;
        display: block;
    }

    .footer-skin-d .footer-slogan {
        font-size: 1.2rem;
        font-weight: 300;
        color: #999;
        max-width: 400px;
        line-height: 1.4;
    }

    .footer-skin-d .footer-bottom {
        display: grid;
        grid-template-columns: 2fr 1fr;
        gap: 100px;
        align-items: end;
    }

    .footer-skin-d .detail-item {
        margin-bottom: 40px;
    }

    .footer-skin-d .label {
        display: block;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        margin-bottom: 10px;
        color: #bbb;
    }

    .footer-skin-d .value {
        font-size: 1.4rem;
        font-weight: 700;
        line-height: 1.2;
    }

    .footer-skin-d .detail-row {
        display: flex;
        gap: 60px;
    }

    .footer-skin-d .footer-meta {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        text-align: right;
    }

    .footer-skin-d .footer-links {
        display: flex;
        gap: 30px;
        margin-bottom: 30px;
    }

    .footer-skin-d .footer-links a {
        font-size: 0.9rem;
        color: #333;
        font-weight: 700;
        text-decoration: none;
    }

    .footer-skin-d .footer-copyright {
        font-size: 0.8rem;
        color: #bbb;
    }
</style>

<div class="footer-skin-d">
    <div class="footer-container">
        <div class="footer-top">
            <div class="footer-brand">
                <div class="footer-logo">
                    {logo}
                </div>
                <div class="footer-slogan">
                    {slogan}
                </div>
            </div>
            <div class="footer-mega-info" style="text-align:right;">
                <div class="mega-company" style="font-size:3rem; font-weight:800; color:#333; line-height:1; margin-bottom:15px;">{company}</div>
                <div class="mega-contact-row" style="opacity:0.6; font-size:1rem;">
                    <span>{ceo_name}. {ceo}</span>
                    <span style="margin-left:30px;">{bizno_name}. {bizno}</span>
                </div>
            </div>
        </div>

        <div class="footer-bottom">
            <div class="footer-details">
                <div class="detail-item">
                    <span class="label">{addr_name}</span>
                    <span class="value">{addr}</span>
                </div>
                <div class="detail-row">
                    <div class="detail-item">
                        <span class="label">{tel_name}</span>
                        <span class="value">{tel}</span>
                    </div>
                    <div class="detail-item">
                        <span class="label">{email_name}</span>
                        <span class="value">{email}</span>
                    </div>
                </div>
            </div>
            
            <div class="footer-meta">
                <div class="footer-links">
                    {link1}
                    {link2}
                </div>
                <div class="footer-copyright">
                    {copyright}
                </div>
            </div>
        </div>
    </div>
</div>
