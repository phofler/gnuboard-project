<style>
    /* Style D: Editorial Bold (Red) */
    .footer-skin-d {
        position: relative;
        background: var(--cp-bg, var(--color-bg-footer)) !important;
        /* Inherit from Theme Variables (--color-bg-footer) */
        color: #fff;
        padding: 10vh 4vw 5vh;
        min-height: 80vh;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        font-family: var(--font-en, 'Manrope', sans-serif);
        overflow: hidden;
    }

    .footer-skin-d * {
        box-sizing: border-box;
    }

    /* Top Row */
    .footer-skin-d .fs-top {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 5vh;
        text-transform: uppercase;
    }

    .footer-skin-d .fs-logo img {
        height: 30px;
        width: auto;
        filter: brightness(0) invert(1);
        /* Ensure logo is white */
    }

    .footer-skin-d .fs-scroll {
        cursor: pointer;
        opacity: 0.7;
        transition: 0.3s;
    }

    .footer-skin-d .fs-scroll:hover {
        opacity: 1;
    }

    /* Big Slogan */
    .footer-skin-d .fs-big {
        font-size: 15vw;
        line-height: 0.8;
        font-weight: 800;
        letter-spacing: -5px;
        margin-bottom: 5vh;
        text-transform: uppercase;
        word-break: keep-all;
    }

    /* Content Grid */
    .footer-skin-d .fs-grid {
        display: flex;
        gap: 10vw;
        font-size: 18px;
        line-height: 2;
        padding-top: 5vh;
        /* Kept for spacing but removed border */
    }

    .footer-skin-d .fs-col {
        min-width: 200px;
    }

    .footer-skin-d .fs-col span {
        display: block;
        opacity: 0.7;
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 10px;
        text-transform: uppercase;
    }

    .footer-skin-d a {
        color: #fff;
        text-decoration: none;
        transition: 0.3s;
    }

    .footer-skin-d a:hover {
        opacity: 0.7;
    }

    .footer-skin-d .fs-copyright {
        margin-top: 10vh;
        font-size: 11px;
        opacity: 0.3;
        font-weight: 300;
    }

    @media (max-width: 768px) {
        .footer-skin-d .fs-grid {
            grid-template-columns: 1fr;
            gap: 40px;
        }

        .footer-skin-d .fs-big {
            font-size: 18vw;
        }
    }
</style>

<div class="footer-skin-d">
    <div class="fs-top">
        <div class="fs-logo">{logo}</div>
        <div class="fs-scroll" onclick="window.scrollTo({top:0, behavior:'smooth'})">SCROLL TO TOP ↑</div>
    </div>

    <div>
        <!-- Slogan Area (User Input) -->
        <div class="fs-big">{slogan}</div>

        <div class="fs-grid">
            <div class="fs-col">
                <span>{email_name} & {tel_name}</span>
                {email}<br>
                {tel}
            </div>
            <div class="fs-col">
                <span>{addr_name}</span>
                {addr}
            </div>
            <div class="fs-col">
                <span>SOCIAL & LINKS</span>
                {link1}<br>
                {link2}
            </div>

            <div class="fs-copyright">
                {copyright}
            </div>
        </div>
    </div>
</div>
