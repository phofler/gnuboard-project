<style>
    /* Style E: Logo Only Premium */
    .footer-skin-e {
        padding: 60px 0;
        text-align: center;
        background-color: var(--cp-bg, #ffffff);
        color: #333;
        margin: 20px 0;
    }

    .footer-skin-e .footer-container {
        max-width: 1200px;
        margin: 0 auto;
        padding: 0 20px;
    }

    .footer-skin-e .footer-logo {
        margin-bottom: 20px;
    }

    .footer-skin-e .footer-logo img {
        height: 60px;
        object-fit: contain;
    }

    .footer-skin-e .footer-copyright {
        font-size: 0.85rem;
        color: #999;
    }
</style>

<div class="footer-skin-e">
    <div class="footer-container">
        <div class="footer-logo">
            {logo}
        </div>
        <div class="footer-copyright">
            {copyright}
        </div>
    </div>
</div>
