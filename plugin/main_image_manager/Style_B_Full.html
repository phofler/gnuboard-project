<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="utf-8">
    <title>Preview Style B (Full)</title>

    <!-- Swiper CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />

    <style>
        body {
            margin: 0;
            padding: 0;
            /* font-family: 'Pretendard', ... Removed to inherit */
            background: var(--color-bg-dark, #000);
        }

        .hero-section {
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .swiper {
            width: 100%;
            height: 100%;
        }

        .hero-full {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .hero-bg-inner {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* Ken Burns Effect (Slow Zoom) */
        @keyframes kenburnsZoom {
            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.1);
            }
        }

        .swiper-slide-active .hero-bg-inner {
            animation: kenburnsZoom 12s ease-out forwards;
        }

        .hero-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        .hero-content-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: var(--color-text-primary, #fff);
            z-index: 2;
            width: 90%;
            max-width: 800px;
        }

        .hero-content-center h2 {
            font-family: var(--font-heading, sans-serif);
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 25px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease 0.2s;
        }

        .hero-content-center p {
            font-family: var(--font-body, sans-serif);
            font-size: 1.5rem;
            line-height: 1.6;
            margin-bottom: 45px;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease 0.4s;
            color: var(--color-text-primary, rgba(255, 255, 255, 0.9));
        }

        /* Active slide animations */
        .swiper-slide-active .hero-content-center h2,
        .swiper-slide-active .hero-content-center p {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-luxury {
            display: inline-block;
            padding: 15px 40px;
            border: 1px solid var(--color-text-primary, #fff);
            color: var(--color-text-primary, #fff);
            text-decoration: none;
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 3px;
            transition: all 0.3s;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s ease 0.6s;
        }

        .swiper-slide-active .btn-luxury {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-luxury:hover {
            background: var(--color-text-primary, #fff);
            color: var(--color-bg-dark, #000);
        }

        /* Swiper custom arrows */
        .swiper-button-next,
        .swiper-button-prev {
            color: #fff !important;
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        .swiper-button-next:hover,
        .swiper-button-prev:hover {
            opacity: 1;
        }

        .swiper-pagination-bullet {
            background: #fff !important;
            opacity: 0.5;
        }

        .swiper-pagination-bullet-active {
            opacity: 1;
        }

        @media (max-width: 768px) {
            .hero-content-center h2 {
                font-size: 2.5rem;
            }

            .hero-content-center p {
                font-size: 1.1rem;
            }
        }

        /* Time Bar */
        .time-bar-container {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 2px;
            background: rgba(255, 255, 255, 0.2);
            z-index: 10;
        }

        .time-bar {
            width: 0%;
            height: 100%;
            background: #fff;
        }

        @keyframes timeFlow {
            from {
                width: 0%;
            }

            to {
                width: 100%;
            }
        }

        .swiper-slide-active .time-bar {
            animation: timeFlow 5s linear forwards;
        }

        /* Scroll Arrow */
        .scroll-arrow {
            position: absolute;
            bottom: 40px;
            right: 40px;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
            z-index: 10;
            text-align: center;
            text-decoration: none;
        }

        .scroll-arrow span {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 2px;
            margin-bottom: 5px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        @keyframes bounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0);
            }

            40% {
                transform: translateY(-10px);
            }

            60% {
                transform: translateY(-5px);
            }
        }

        .scroll-arrow i {
            display: block;
            animation: bounce 2s infinite;
            font-style: normal;
        }

        /* Adjust pagination position to be below time bar */
        .swiper-pagination {
            bottom: 20px !important;
        }
    </style>
</head>

<body>

    <div class="hero-section">
        <div class="swiper mySwiperB">
            <div class="swiper-wrapper">

                <!-- Slide 1 -->
                <div class="swiper-slide">
                    <div class="hero-full">
                        <div class="hero-bg-inner"
                            style="background-image: url('https://images.unsplash.com/photo-1481277542470-605612bd2d61?auto=format&fit=crop&q=80');">
                        </div>
                        <div class="hero-overlay"></div>
                        <div class="hero-content-center">
                            <h2>프리미엄 공간의 시작</h2>
                            <p>르네상스 환경디자인산업은 1978년부터 이어온 기술력으로<br>배경만 확대되어 텍스트 가독성을 더했습니다.</p>
                            <a href="#" class="btn-luxury">VIEW MORE</a>
                        </div>
                        <div class="time-bar-container">
                            <div class="time-bar"></div>
                        </div>
                    </div>
                </div>

                <!-- Slide 2 -->
                <div class="swiper-slide">
                    <div class="hero-full">
                        <div class="hero-bg-inner"
                            style="background-image: url('https://images.unsplash.com/photo-1600585154526-990dced4db0d?auto=format&fit=crop&q=80');">
                        </div>
                        <div class="hero-overlay"></div>
                        <div class="hero-content-center">
                            <h2>차별화된 기술력</h2>
                            <p>특수자동게이트, 현관문, 오버헤드도어 전문 제작 라인을 통해<br>최상의 품질과 보안을 약속드립니다.</p>
                            <a href="#" class="btn-luxury">VIEW MORE</a>
                        </div>
                        <div class="time-bar-container">
                            <div class="time-bar"></div>
                        </div>
                    </div>
                </div>

                <!-- Slide 3 -->
                <div class="swiper-slide">
                    <div class="hero-full">
                        <div class="hero-bg-inner"
                            style="background-image: url('https://images.unsplash.com/photo-1600607686527-6fb886090705?auto=format&fit=crop&q=80');">
                        </div>
                        <div class="hero-overlay"></div>
                        <div class="hero-content-center">
                            <h2>고객 맞춤형 디자인</h2>
                            <p>창조성과 정확성을 바탕으로 고객이 원하는<br>최상의 마무리를 실현합니다.</p>
                            <a href="#" class="btn-luxury">VIEW MORE</a>
                        </div>
                        <div class="time-bar-container">
                            <div class="time-bar"></div>
                        </div>
                    </div>
                </div>

            </div>
            <!-- Add Arrows -->
            <div class="swiper-button-next"></div>
            <div class="swiper-button-prev"></div>
            <!-- Add Pagination -->
            <div class="swiper-pagination"></div>
        </div>

        <div class="scroll-arrow" onclick="scrollDown()">
            <span>Scroll</span>
            <i>↓</i>
        </div>
    </div>

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        var swiperB = new Swiper(".mySwiperB", {
            loop: true,
            effect: "fade",
            fadeEffect: {
                crossFade: true
            },
            autoplay: {
                delay: 5000,
                disableOnInteraction: false,
            },
            pagination: {
                el: ".swiper-pagination",
                clickable: true,
            },
            navigation: {
                nextEl: ".swiper-button-next",
                prevEl: ".swiper-button-prev",
            },
            speed: 1500
        });

        function scrollDown() {
            window.scrollTo({
                top: window.innerHeight,
                behavior: 'smooth'
            });
        }
    </script>
</body>

</html>
