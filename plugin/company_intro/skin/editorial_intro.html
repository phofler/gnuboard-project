<section class="editorial-intro-section container" style="padding: var(--spacing-section) var(--container-padding);">
    <style>
        .editorial-intro-section {
            --c-brand: #FF3B30;
        }
    </style>
    <div style="display: grid; grid-template-columns: 1fr 1.5fr; gap: 5vw; align-items: start;">
        <div data-aos="fade-up">
            <span
                style="display: block; width: 50px; height: 2px; background: var(--c-brand); margin-top: 20px;"></span>
        </div>
        <div class="editorial-lead-text" data-aos="fade-up" data-aos-delay="300"
            style="font-size: clamp(24px, 2.5vw, 24px); line-height: 1.8; font-weight: 500; color: var(--color-text-primary);">
            우리는 진정한 럭셔리가 <b style="color: var(--c-brand); font-weight: 600;">덜어냄(Reduction)</b>에 있다고
            믿습니다.<br>
            소음으로 가득 찬 세상에서 우리는 고요를 창조합니다.<br>
            우리의 디자인 철학은 '디지털 브루탈리즘'에 뿌리를 두고 있습니다. —<br>
            가공되지 않은 정직함, 그리고 무엇보다 강력한 힘을 지닌 본질적인 아름다움입니다.
        </div>
    </div>
</section>
