<style>
    /* Recruit Skin A - Standard Style 
     * Standardized for Theme Compatibility
     */

    /* [Standard] Wrapper Pattern */
    .ci-skin-wrapper {
        width: 100%;
        max-width: var(--spacing-container, 1200px);
        margin: 0 auto;
        padding: var(--spacing-section, 60px) 20px;
        box-sizing: border-box;
    }

    /* Header (Left Aligned Standard) */
    .ci-skin-wrapper .section-header {
        text-align: left;
        margin-bottom: 60px;
        border-left: 4px solid var(--color-accent-gold, #d4af37);
        padding-left: 25px;
    }

    .ci-skin-wrapper .section-header h2 {
        /* Section Title Rule: Accent Color */
        color: var(--color-accent-gold, #d4af37);
        font-family: var(--font-heading);
        font-size: 2.5rem;
        margin-bottom: 1rem;
        font-weight: 700;
    }

    .ci-skin-wrapper .section-header p {
        color: var(--color-text-secondary);
        font-size: 1.1rem;
        display: block;
        text-align: left;
    }

    /* Slogan Box */
    .recruit-slogan {
        background: var(--color-bg-panel, rgba(255, 255, 255, 0.03));
        border: 1px solid var(--color-border, rgba(255, 255, 255, 0.1));
        padding: 40px;
        text-align: center;
        margin-bottom: 60px;
        border-radius: 8px;
    }

    .recruit-slogan h3 {
        font-size: 1.8rem;
        color: var(--color-accent-gold, #d4af37);
        margin-bottom: 15px;
        font-family: var(--font-heading);
        font-weight: 700;
    }

    .recruit-slogan p {
        font-size: 1.1rem;
        color: var(--color-text-primary);
    }

    /* Section Title */
    .sub-title {
        font-size: 1.4rem;
        color: var(--color-text-primary);
        margin-bottom: 20px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.2);
        padding-bottom: 15px;
        font-weight: 700;
    }

    .sub-title span {
        color: var(--color-accent-gold, #d4af37);
        margin-right: 10px;
    }

    /* Info List */
    .info-list {
        margin-bottom: 80px;
    }

    .info-item {
        display: flex;
        margin-bottom: 15px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        padding-bottom: 15px;
    }

    .info-label {
        width: 120px;
        color: var(--color-text-secondary);
        font-weight: bold;
        flex-shrink: 0;
    }

    .info-content {
        color: var(--color-text-primary);
        line-height: 1.6;
    }

    /* Process Flow */
    .process-flow {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        margin-top: 40px;
    }

    .process-step {
        flex: 1;
        text-align: center;
        position: relative;
    }

    .step-circle {
        width: 140px;
        height: 140px;
        background: rgba(255, 255, 255, 0.05);
        border: 2px solid var(--color-accent-gold, #d4af37);
        border-radius: 50%;
        margin: 0 auto 20px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        transition: all 0.3s;
    }

    .process-step:hover .step-circle {
        background: var(--color-accent-gold, #d4af37);
        box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
    }

    .process-step:hover .step-icon,
    .process-step:hover .step-title {
        color: #000;
        /* Contrast color on gold */
    }

    .step-icon {
        font-size: 2rem;
        color: var(--color-accent-gold, #d4af37);
        margin-bottom: 10px;
    }

    .step-title {
        font-size: 1.1rem;
        font-weight: bold;
        color: var(--color-text-primary);
    }

    /* Arrow */
    .process-step::after {
        content: '▶';
        position: absolute;
        top: 70px;
        right: -20px;
        color: rgba(255, 255, 255, 0.2);
        font-size: 1.5rem;
        transform: translateY(-50%);
    }

    .process-step:last-child::after {
        display: none;
    }

    @media (max-width: 768px) {
        .process-flow {
            flex-direction: column;
        }

        .process-step::after {
            content: '▼';
            top: auto;
            bottom: -25px;
            right: 50%;
            transform: translateX(50%);
        }
    }
</style>
