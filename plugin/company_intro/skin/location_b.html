<!-- Copyright Data Loaded via Placeholders -->
<meta charset="utf-8">
<style>
    /* Location Skin B - Split Style */
    .loc-b-wrap {
        width: 100%;
        max-width: var(--spacing-container, 1200px);
        margin: 0 auto;
        padding: var(--spacing-section, 80px) 20px;
        box-sizing: border-box;
    }

    /* Header */
    .loc-b-wrap .section-header {
        text-align: left;
        margin-bottom: 60px;
        border-left: 4px solid var(--color-accent-gold);
        padding-left: 25px;
    }

    .loc-b-wrap .section-header h2 {
        font-size: 2.5rem;
        color: var(--color-text-primary);
        font-family: var(--font-heading);
        margin-bottom: 0.5rem;
    }

    .loc-b-wrap .section-header p {
        color: var(--color-text-secondary);
        font-size: 1.1rem;
    }

    /* Split Grid */
    .loc-b-grid {
        display: grid;
        grid-template-columns: 400px 1fr;
        gap: 0;
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 12px;
        overflow: hidden;
        background: #1a1a1a;
    }

    /* Left: Info Area */
    .loc-b-info {
        padding: 50px 40px;
        background: #1f1f1f;
        display: flex;
        flex-direction: column;
        justify-content: center;
    }

    .loc-b-info h3 {
        color: #fff;
        font-size: 1.5rem;
        margin-bottom: 30px;
        font-family: var(--font-heading);
        border-bottom: 2px solid var(--color-accent-gold);
        display: inline-block;
        padding-bottom: 10px;
    }

    .loc-b-list {
        list-style: none;
        padding: 0;
        margin: 0;
    }

    .loc-b-list li {
        margin-bottom: 25px;
    }

    .loc-b-list li strong {
        display: block;
        color: var(--color-text-secondary);
        font-size: 0.9rem;
        margin-bottom: 8px;
        text-transform: uppercase;
        opacity: 0.7;
    }

    .loc-b-list li span {
        display: block;
        color: #fff;
        font-size: 1.1rem;
        font-weight: 500;
        line-height: 1.4;
    }

    /* Right: Map Area */
    .loc-b-map {
        width: 100%;
        height: 100%;
        min-height: 600px;
        position: relative;
    }

    #root_daum_roughmap {
        width: 100%;
        height: 100%;
    }

    /* Mobile */
    @media (max-width: 991px) {
        .loc-b-grid {
            grid-template-columns: 1fr;
        }

        .loc-b-map {
            height: 400px;
            min-height: 400px;
            order: -1;
            /* Map on top for mobile */
        }
    }
</style>

<div class="loc-b-wrap">
    <div class="section-header">
        <h2>LOCATION</h2>
        <p>고객 여러분의 방문을 진심으로 환영합니다.</p>
    </div>

    <div class="loc-b-grid">
        <!-- Info Side -->
        <div class="loc-b-info">
            <h3>Contact Us</h3>
            <ul class="loc-b-list">
                <li>
                    <strong>Address</strong>
                    <span>{CP_ADDRESS}</span>
                </li>

                <li>
                    <strong>Tel</strong>
                    <span>{CP_TEL}</span>
                </li>

                <li>
                    <strong>Fax</strong>
                    <span>{CP_FAX}</span>
                </li>

                <li>
                    <strong>Email</strong>
                    <span>{CP_EMAIL}</span>
                </li>
            </ul>
        </div>

        <!-- Map Side -->
        <div class="loc-b-map">
            {MAP_API_DISPLAY}
        </div>
    </div>
</div>
