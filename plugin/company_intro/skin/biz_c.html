<style>
    /* Business Area Skin C - Overlay (Gallery) Style */
    .biz-section-c {
        width: 100%;
        max-width: var(--spacing-container, 1200px);
        margin: 0 auto;
        padding: 0;
        box-sizing: border-box;
    }

    /* Header */
    .biz-section-c .section-header {
        text-align: center;
        margin-bottom: 60px;
        /* Reset Global 'Edge Bar' Style */
        border-left: 0 !important;
        padding-left: 0 !important;
    }

    .biz-section-c .section-header h2 {
        font-size: 2.5rem;
        color: var(--color-text-primary);
        font-family: var(--font-heading);
        margin-bottom: 1rem;
    }

    .biz-section-c .section-header p {
        color: var(--color-text-secondary);
        display: block;
    }

    .biz-section-c .section-header::after {
        content: '';
        display: block;
        width: 60px;
        height: 4px;
        background: var(--color-accent-gold);
        margin: 20px auto 0;
        border-radius: 2px;
    }

    /* Grid Layout */
    .biz-c-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 20px;
    }

    .biz-c-card {
        position: relative;
        height: 400px;
        border-radius: 12px;
        overflow: hidden;
        cursor: pointer;
        group: card;
    }

    /* Background Image */
    .biz-c-bg {
        width: 100%;
        height: 100%;
        background-size: cover;
        background-position: center;
        transition: transform 0.6s;
    }

    /* Overlay Gradient */
    .biz-c-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.1));
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 30px;
        box-sizing: border-box;
        transition: background 0.3s;
    }

    /* Hover Effects */
    .biz-c-card:hover .biz-c-bg {
        transform: scale(1.1);
    }

    .biz-c-card:hover .biz-c-overlay {
        background: linear-gradient(to top, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.3));
    }

    .biz-c-icon {
        font-size: 3.5rem;
        font-weight: 800;
        font-family: var(--font-heading);
        color: var(--color-accent-gold);
        margin-bottom: 20px;
        transform: translateY(0);
        transition: transform 0.3s;
        line-height: 1;
    }

    .biz-c-title {
        font-size: 1.5rem;
        color: #fff;
        font-weight: bold;
        margin-bottom: 10px;
        font-family: var(--font-heading);
    }

    .biz-c-desc {
        font-size: 0.95rem;
        color: rgba(255, 255, 255, 0.8);
        line-height: 1.5;
        max-height: 0;
        overflow: hidden;
        opacity: 0;
        transition: all 0.4s ease;
        transform: translateY(20px);
    }

    /* Show description on hover */
    .biz-c-card:hover .biz-c-desc {
        max-height: 100px;
        opacity: 1;
        transform: translateY(0);
    }

    .biz-c-card:hover .biz-c-icon {
        transform: translateY(-10px);
    }

    @media (max-width: 900px) {
        .biz-c-grid {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    @media (max-width: 600px) {
        .biz-c-grid {
            grid-template-columns: 1fr;
        }

        .biz-c-card {
            height: 350px;
        }

        .biz-c-desc {
            max-height: 100px;
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<div class="biz-section-c">
    <div class="section-header">
        <h2>BUSINESS AREA</h2>
        <p>비주얼 중심의 강력한 임팩트</p>
    </div>

    <div class="biz-c-grid">
        <!-- Card 1 -->
        <div class="biz-c-card" data-aos="fade-up">
            <div class="biz-c-bg"
                style="background-image: url('https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=800&auto=format&fit=crop');">
            </div>
            <div class="biz-c-overlay">
                <div class="biz-c-icon">01</div>
                <h3 class="biz-c-title">Space Design</h3>
                <p class="biz-c-desc">감각적인 공간 디자인으로 새로운 라이프스타일을 제안합니다.</p>
            </div>
        </div>

        <!-- Card 2 -->
        <div class="biz-c-card" data-aos="fade-up" data-aos-delay="100">
            <div class="biz-c-bg"
                style="background-image: url('https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?q=80&w=800&auto=format&fit=crop');">
            </div>
            <div class="biz-c-overlay">
                <div class="biz-c-icon">02</div>
                <h3 class="biz-c-title">Architecture</h3>
                <p class="biz-c-desc">도시의 랜드마크가 될 혁신적인 건축물을 설계하고 시공합니다.</p>
            </div>
        </div>

        <!-- Card 3 -->
        <div class="biz-c-card" data-aos="fade-up" data-aos-delay="200">
            <div class="biz-c-bg"
                style="background-image: url('https://images.unsplash.com/photo-1542744173-8e7e53415bb0?q=80&w=800&auto=format&fit=crop');">
            </div>
            <div class="biz-c-overlay">
                <div class="biz-c-icon">03</div>
                <h3 class="biz-c-title">Consulting</h3>
                <p class="biz-c-desc">데이터 기반의 컨설팅으로 비즈니스의 확실한 성장을 약속합니다.</p>
            </div>
        </div>
    </div>
</div>
