<style>
    /* Certificate Type A - Grid Gallery (Smart Inherited) */
    .cert-section {
        width: 100%;
        max-width: var(--spacing-container, 1200px);
        margin: 0 auto;
        padding: 0;
        box-sizing: border-box;
    }

    /* Header - Center Style (matches Type C & Timelines) */
    .cert-section .section-header {
        text-align: center;
        margin-bottom: 50px;
    }

    /* Bottom Gold Bar */
    .cert-section .section-header::after {
        content: '';
        display: block;
        width: 60px;
        height: 4px;
        background: var(--color-accent-gold);
        margin: 20px auto 0;
        border-radius: 2px;
    }

    .section-header h2 {
        color: var(--color-text-primary);
        font-family: var(--font-heading);
    }

    .section-header p {
        color: var(--color-text-secondary);
        justify-content: center;
    }

    .cert-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 30px;
    }

    .cert-item {
        background: rgba(255, 255, 255, 0.03);
        /* Dark Theme Panel */
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 20px;
        text-align: center;
        border-radius: 12px;
        transition: transform 0.3s, border-color 0.3s;
    }

    .cert-item:hover {
        transform: translateY(-5px);
        border-color: var(--color-accent-gold);
    }

    .cert-img-wrap {
        width: 100%;
        aspect-ratio: 3/4;
        background: rgba(0, 0, 0, 0.2);
        margin-bottom: 20px;
        overflow: hidden;
        position: relative;
        border-radius: 4px;
        border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .cert-img-wrap img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        padding: 10px;
        box-sizing: border-box;
        transition: transform 0.3s;
    }

    .cert-item:hover .cert-img-wrap img {
        transform: scale(1.05);
    }

    .cert-title {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--color-text-primary);
        margin: 10px 0 5px;
        font-family: var(--font-heading);
    }

    .cert-desc {
        font-size: 0.9rem;
        color: var(--color-text-secondary);
    }
</style>

<div class="cert-section">
    <div class="section-header text-center mb-5">
        <h2 style="font-size: 2.5rem; margin-bottom: 1rem;">CERTIFICATES</h2>
        <p>기술력과 품질을 인증받은 기업입니다.</p>
    </div>

    <div class="cert-grid">
        <!-- Item 1 -->
        <div class="cert-item" data-aos="fade-up">
            <div class="cert-img-wrap">
                <img src="https://plus.unsplash.com/premium_photo-1661331773030-349071aafe25?q=80&w=600&auto=format&fit=crop"
                    alt="ISO 9001">
            </div>
            <h3 class="cert-title">ISO 9001</h3>
            <p class="cert-desc">품질경영시스템 인증</p>
        </div>

        <!-- Item 2 -->
        <div class="cert-item" data-aos="fade-up" data-aos-delay="100">
            <div class="cert-img-wrap">
                <img src="https://plus.unsplash.com/premium_photo-1661391983057-047b74f39ce2?q=80&w=600&auto=format&fit=crop"
                    alt="ISO 14001">
            </div>
            <h3 class="cert-title">ISO 14001</h3>
            <p class="cert-desc">환경경영시스템 인증</p>
        </div>

        <!-- Item 3 -->
        <div class="cert-item" data-aos="fade-up" data-aos-delay="200">
            <div class="cert-img-wrap">
                <img src="https://images.unsplash.com/photo-1635350736475-c8cef4b21906?q=80&w=600&auto=format&fit=crop"
                    alt="Venture">
            </div>
            <h3 class="cert-title">벤처기업 인증</h3>
            <p class="cert-desc">혁신성장유형</p>
        </div>

        <!-- Item 4 -->
        <div class="cert-item" data-aos="fade-up" data-aos-delay="300">
            <div class="cert-img-wrap">
                <img src="https://images.unsplash.com/photo-1542744173-8e7e53415bb0?q=80&w=600&auto=format&fit=crop"
                    alt="Patent">
            </div>
            <h3 class="cert-title">특허증</h3>
            <p class="cert-desc">기술 특허 등록</p>
        </div>
    </div>
</div>
