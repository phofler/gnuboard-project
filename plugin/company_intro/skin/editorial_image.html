<section class="editorial-image-section container" style="padding: 0 var(--container-padding) var(--spacing-section);">
    <style>
        .editorial-img-link {
            display: block;
            width: 100%;
            height: 60vh;
            min-height: 500px;
            overflow: hidden;
            position: relative;
            background: #eee;
        }

        .editorial-img-link img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: grayscale(100%);
            transition: 1.2s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .editorial-img-link:hover img {
            filter: grayscale(0%);
            transform: scale(1.03);
        }
    </style>
    <div class="editorial-img-link" data-aos="zoom-in" data-aos-duration="1200">
        <img src="https://images.unsplash.com/photo-1497366216548-37526070297c?q=80&w=2069&auto=format&fit=crop"
            alt="Editorial Image">
    </div>
</section>
